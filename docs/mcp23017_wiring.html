<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MCP23017 Wiring Diagram</title>
<style>
  body { background: #1a1a2e; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
</style>
</head>
<body>
<svg width="900" height="750" viewBox="0 0 900 750" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, monospace">

  <!-- Background -->
  <rect width="900" height="750" rx="16" fill="#16213e"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e0e0e0" font-size="20" font-weight="bold">MCP23017 I2C Wiring — MISC Panel (addr 0x20)</text>

  <!-- ======================== -->
  <!-- Teensy 4.1 -->
  <!-- ======================== -->
  <rect x="40" y="180" width="150" height="340" rx="10" fill="#1b5e20" stroke="#4caf50" stroke-width="2"/>
  <text x="115" y="210" text-anchor="middle" fill="#c8e6c9" font-size="15" font-weight="bold">Teensy 4.1</text>

  <!-- Teensy pins -->
  <text x="160" y="270" fill="#a5d6a7" font-size="12" text-anchor="end">Pin 18 (SDA)</text>
  <circle cx="190" cy="266" r="5" fill="#4fc3f7"/>

  <text x="160" y="310" fill="#a5d6a7" font-size="12" text-anchor="end">Pin 19 (SCL)</text>
  <circle cx="190" cy="306" r="5" fill="#4fc3f7"/>

  <text x="160" y="370" fill="#a5d6a7" font-size="12" text-anchor="end">3.3V</text>
  <circle cx="190" cy="366" r="5" fill="#f44336"/>

  <text x="160" y="410" fill="#a5d6a7" font-size="12" text-anchor="end">GND</text>
  <circle cx="190" cy="406" r="5" fill="#66bb6a"/>

  <!-- ======================== -->
  <!-- I2C Bus wires -->
  <!-- ======================== -->

  <!-- SDA wire -->
  <line x1="190" y1="266" x2="370" y2="266" stroke="#4fc3f7" stroke-width="2.5"/>
  <text x="280" y="258" text-anchor="middle" fill="#4fc3f7" font-size="11">SDA</text>

  <!-- SCL wire -->
  <line x1="190" y1="306" x2="370" y2="306" stroke="#ffb74d" stroke-width="2.5"/>
  <text x="280" y="298" text-anchor="middle" fill="#ffb74d" font-size="11">SCL</text>

  <!-- 3.3V wire -->
  <line x1="190" y1="366" x2="370" y2="366" stroke="#f44336" stroke-width="2"/>

  <!-- GND wire -->
  <line x1="190" y1="406" x2="370" y2="406" stroke="#66bb6a" stroke-width="2"/>
  <!-- GND extends further for address pins -->
  <line x1="310" y1="406" x2="310" y2="490" stroke="#66bb6a" stroke-width="2"/>

  <!-- ======================== -->
  <!-- Pull-up resistors -->
  <!-- ======================== -->

  <!-- SDA pullup junction -->
  <circle cx="260" cy="266" r="4" fill="#4fc3f7"/>
  <line x1="260" y1="266" x2="260" y2="200" stroke="#4fc3f7" stroke-width="1.5"/>
  <rect x="244" y="140" width="32" height="60" rx="4" fill="#37474f" stroke="#78909c" stroke-width="1.5"/>
  <text x="260" y="168" text-anchor="middle" fill="#fff" font-size="10">4.7</text>
  <text x="260" y="180" text-anchor="middle" fill="#fff" font-size="10">kΩ</text>
  <line x1="260" y1="140" x2="260" y2="110" stroke="#f44336" stroke-width="1.5"/>

  <!-- SCL pullup junction -->
  <circle cx="300" cy="306" r="4" fill="#ffb74d"/>
  <line x1="300" y1="306" x2="300" y2="200" stroke="#ffb74d" stroke-width="1.5"/>
  <rect x="284" y="140" width="32" height="60" rx="4" fill="#37474f" stroke="#78909c" stroke-width="1.5"/>
  <text x="300" y="168" text-anchor="middle" fill="#fff" font-size="10">4.7</text>
  <text x="300" y="180" text-anchor="middle" fill="#fff" font-size="10">kΩ</text>
  <line x1="300" y1="140" x2="300" y2="110" stroke="#f44336" stroke-width="1.5"/>

  <!-- 3.3V rail for pullups -->
  <line x1="250" y1="110" x2="310" y2="110" stroke="#f44336" stroke-width="2.5"/>
  <line x1="280" y1="110" x2="280" y2="95" stroke="#f44336" stroke-width="2"/>
  <rect x="255" y="72" width="50" height="24" rx="4" fill="#b71c1c"/>
  <text x="280" y="89" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">3.3V</text>

  <text x="280" y="130" text-anchor="middle" fill="#aaa" font-size="10">외부 풀업 (권장)</text>

  <!-- ======================== -->
  <!-- MCP23017 IC -->
  <!-- ======================== -->
  <rect x="370" y="140" width="200" height="440" rx="8" fill="#1a237e" stroke="#5c6bc0" stroke-width="2.5"/>
  <text x="470" y="172" text-anchor="middle" fill="#9fa8da" font-size="16" font-weight="bold">MCP23017</text>
  <text x="470" y="192" text-anchor="middle" fill="#7986cb" font-size="12">I2C I/O Expander</text>
  <text x="470" y="210" text-anchor="middle" fill="#5c6bc0" font-size="11">addr: 0x20</text>

  <!-- Left side pins -->
  <!-- SDA -->
  <circle cx="370" cy="266" r="5" fill="#4fc3f7"/>
  <text x="385" y="270" fill="#9fa8da" font-size="11">SDA</text>

  <!-- SCL -->
  <circle cx="370" cy="306" r="5" fill="#ffb74d"/>
  <text x="385" y="310" fill="#9fa8da" font-size="11">SCL</text>

  <!-- VDD -->
  <circle cx="370" cy="366" r="5" fill="#f44336"/>
  <text x="385" y="370" fill="#9fa8da" font-size="11">VDD</text>

  <!-- VSS -->
  <circle cx="370" cy="406" r="5" fill="#66bb6a"/>
  <text x="385" y="410" fill="#9fa8da" font-size="11">VSS</text>

  <!-- RESET (tie to VDD) -->
  <circle cx="370" cy="446" r="5" fill="#f44336"/>
  <text x="385" y="450" fill="#9fa8da" font-size="11">RESET</text>
  <line x1="350" y1="446" x2="370" y2="446" stroke="#f44336" stroke-width="1.5"/>
  <line x1="350" y1="446" x2="350" y2="366" stroke="#f44336" stroke-width="1.5"/>
  <circle cx="350" cy="366" r="3" fill="#f44336"/>
  <text x="340" y="440" text-anchor="end" fill="#aaa" font-size="9">→ VDD</text>

  <!-- Address pins -->
  <circle cx="370" cy="486" r="5" fill="#66bb6a"/>
  <text x="385" y="490" fill="#9fa8da" font-size="11">A0</text>
  <circle cx="370" cy="516" r="5" fill="#66bb6a"/>
  <text x="385" y="520" fill="#9fa8da" font-size="11">A1</text>
  <circle cx="370" cy="546" r="5" fill="#66bb6a"/>
  <text x="385" y="550" fill="#9fa8da" font-size="11">A2</text>

  <!-- Address pins to GND -->
  <line x1="310" y1="490" x2="370" y2="486" stroke="#66bb6a" stroke-width="1.5"/>
  <line x1="310" y1="490" x2="370" y2="516" stroke="#66bb6a" stroke-width="1.5"/>
  <line x1="310" y1="490" x2="370" y2="546" stroke="#66bb6a" stroke-width="1.5"/>
  <circle cx="310" cy="490" r="3" fill="#66bb6a"/>

  <!-- Address label -->
  <text x="310" y="560" text-anchor="middle" fill="#aaa" font-size="10">A0=A1=A2=GND</text>
  <text x="310" y="574" text-anchor="middle" fill="#aaa" font-size="10">→ addr 0x20</text>

  <!-- ======================== -->
  <!-- Right side - GPA ports (switches) -->
  <!-- ======================== -->

  <!-- GPA header -->
  <text x="600" y="240" text-anchor="start" fill="#81c784" font-size="12" font-weight="bold">Port A (Input)</text>

  <!-- GPA0-7 pins -->
  <circle cx="570" cy="266" r="5" fill="#81c784"/><text x="585" y="270" fill="#c8e6c9" font-size="11">GPA0 — Laser ARM</text>
  <line x1="570" y1="266" x2="540" y2="266" stroke="#81c784" stroke-width="1.5"/>

  <circle cx="570" cy="290" r="5" fill="#81c784"/><text x="585" y="294" fill="#c8e6c9" font-size="11">GPA1 — RF (pos1)</text>
  <line x1="570" y1="290" x2="540" y2="290" stroke="#81c784" stroke-width="1.5"/>

  <circle cx="570" cy="314" r="5" fill="#81c784"/><text x="585" y="318" fill="#c8e6c9" font-size="11">GPA2 — RF (pos2)</text>
  <line x1="570" y1="314" x2="540" y2="314" stroke="#81c784" stroke-width="1.5"/>

  <circle cx="570" cy="338" r="5" fill="#81c784"/><text x="585" y="342" fill="#c8e6c9" font-size="11">GPA3 — Master ARM (pos1)</text>
  <line x1="570" y1="338" x2="540" y2="338" stroke="#81c784" stroke-width="1.5"/>

  <circle cx="570" cy="362" r="5" fill="#81c784"/><text x="585" y="366" fill="#c8e6c9" font-size="11">GPA4 — Master ARM (pos2)</text>
  <line x1="570" y1="362" x2="540" y2="362" stroke="#81c784" stroke-width="1.5"/>

  <circle cx="570" cy="386" r="5" fill="#81c784"/><text x="585" y="390" fill="#c8e6c9" font-size="11">GPA5 — Pitch AP (pos1)</text>
  <line x1="570" y1="386" x2="540" y2="386" stroke="#81c784" stroke-width="1.5"/>

  <circle cx="570" cy="410" r="5" fill="#81c784"/><text x="585" y="414" fill="#c8e6c9" font-size="11">GPA6 — Pitch AP (pos2)</text>
  <line x1="570" y1="410" x2="540" y2="410" stroke="#81c784" stroke-width="1.5"/>

  <circle cx="570" cy="434" r="5" fill="#81c784"/><text x="585" y="438" fill="#c8e6c9" font-size="11">GPA7 — Roll AP (pos1)</text>
  <line x1="570" y1="434" x2="540" y2="434" stroke="#81c784" stroke-width="1.5"/>

  <!-- Port A internal pullup note -->
  <line x1="540" y1="260" x2="540" y2="440" stroke="#546e7a" stroke-width="1" stroke-dasharray="3"/>
  <text x="548" y="456" fill="#78909c" font-size="9">내부 풀업 활성</text>

  <!-- ======================== -->
  <!-- GPB ports -->
  <!-- ======================== -->
  <text x="600" y="486" text-anchor="start" fill="#64b5f6" font-size="12" font-weight="bold">Port B</text>

  <circle cx="570" cy="506" r="5" fill="#64b5f6"/><text x="585" y="510" fill="#bbdefb" font-size="11">GPB0 — Roll AP (pos2)</text>
  <line x1="570" y1="506" x2="540" y2="506" stroke="#64b5f6" stroke-width="1.5"/>

  <circle cx="570" cy="530" r="5" fill="#64b5f6"/><text x="585" y="534" fill="#bbdefb" font-size="11">GPB1 — ALT REL</text>
  <line x1="570" y1="530" x2="540" y2="530" stroke="#64b5f6" stroke-width="1.5"/>

  <circle cx="570" cy="554" r="5" fill="#64b5f6"/><text x="585" y="558" fill="#bbdefb" font-size="11">GPB2 — ADV MODE</text>
  <line x1="570" y1="554" x2="540" y2="554" stroke="#64b5f6" stroke-width="1.5"/>

  <circle cx="570" cy="578" r="5" fill="#ff8a65"/><text x="585" y="582" fill="#ffccbc" font-size="11">GPB3 — ECM LED (Output)</text>
  <line x1="570" y1="578" x2="540" y2="578" stroke="#ff8a65" stroke-width="1.5"/>

  <!-- ======================== -->
  <!-- Switch symbol -->
  <!-- ======================== -->
  <rect x="40" y="600" width="220" height="110" rx="8" fill="#263238" stroke="#546e7a" stroke-width="1.5"/>
  <text x="150" y="625" text-anchor="middle" fill="#b0bec5" font-size="12" font-weight="bold">스위치 연결 (각 핀 공통)</text>

  <text x="60" y="660" fill="#81c784" font-size="12">GPAx/GPBx</text>
  <line x1="145" y1="656" x2="175" y2="656" stroke="#81c784" stroke-width="2"/>
  <line x1="175" y1="656" x2="195" y2="645" stroke="#81c784" stroke-width="2"/>
  <circle cx="200" cy="656" r="4" fill="none" stroke="#81c784" stroke-width="1.5"/>
  <line x1="205" y1="656" x2="230" y2="656" stroke="#66bb6a" stroke-width="2"/>
  <text x="238" y="660" fill="#66bb6a" font-size="12">GND</text>

  <text x="60" y="690" fill="#aaa" font-size="10">MCP 내부 풀업 → 별도 저항 불필요</text>

  <!-- ======================== -->
  <!-- LED symbol -->
  <!-- ======================== -->
  <rect x="320" y="600" width="280" height="110" rx="8" fill="#263238" stroke="#546e7a" stroke-width="1.5"/>
  <text x="460" y="625" text-anchor="middle" fill="#b0bec5" font-size="12" font-weight="bold">LED 연결 (GPB3 예시)</text>

  <text x="340" y="665" fill="#ff8a65" font-size="12">GPB3</text>
  <line x1="385" y1="661" x2="420" y2="661" stroke="#ff8a65" stroke-width="2"/>
  <!-- Resistor -->
  <rect x="420" y="651" width="40" height="20" rx="3" fill="#37474f" stroke="#78909c" stroke-width="1"/>
  <text x="440" y="665" text-anchor="middle" fill="#fff" font-size="9">220Ω</text>
  <line x1="460" y1="661" x2="480" y2="661" stroke="#ff8a65" stroke-width="2"/>
  <!-- LED triangle -->
  <polygon points="480,651 480,671 500,661" fill="#ff8a65" opacity="0.7"/>
  <line x1="500" y1="651" x2="500" y2="671" stroke="#ff8a65" stroke-width="2"/>
  <line x1="500" y1="661" x2="530" y2="661" stroke="#66bb6a" stroke-width="2"/>
  <text x="538" y="665" fill="#66bb6a" font-size="12">GND</text>

  <text x="340" y="695" fill="#aaa" font-size="10">LED 보호용 저항 필수</text>

</svg>
</body>
</html>
